<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>محرر عروض الأسعار | الدر النفيس</title>
    <link rel="icon" href="assets/app-icon.ico">
    <link rel="stylesheet" href="styles.css?v=v4">
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <img src="assets/LOGO.png" alt="شعار شركة الدر النفيس للاستشارات الهندسية">
        <div>
          <p>شركة الدر النفيس للاستشارات الهندسية</p>
          <h1>محرر عروض</h1>
        </div>
      </div>
      <div class="actions">
        <button id="printBtn" class="primary-btn" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 9V3h12v6M6 17H4a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2"/>
            <path d="M6 14h12v7H6zM8 6h8"/>
          </svg>
          طباعة / حفظ PDF
        </button>
        <button id="shareWhatsappBtn" class="secondary-btn" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 11.5a8.5 8.5 0 0 1-12.4 7.6L3 21l1.9-5.4A8.5 8.5 0 1 1 21 11.5z"/>
            <path d="M8.7 8.8c.2-.5.4-.5.7-.5h.5c.2 0 .4.1.5.4l.7 1.6c.1.2.1.4-.1.6l-.4.5c-.1.1-.2.3-.1.5.4.8 1.1 1.5 2 2 .2.1.4.1.5-.1l.6-.7c.1-.2.4-.2.6-.1l1.6.8c.2.1.3.3.3.5-.1.7-.6 1.4-1.3 1.6-1.3.3-3.4-.6-5-2.2-1.6-1.6-2.5-3.7-2.1-5z"/>
          </svg>
          مشاركة واتساب
        </button>
        <button id="resetBtn" class="secondary-btn" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 12a9 9 0 1 0 3-6.7"/>
            <path d="M3 4v6h6"/>
          </svg>
          إعادة تعبئة البيانات الافتراضية
        </button>
      </div>
    </header>

    <main class="workspace">
      <aside class="editor-panel" aria-label="لوحة تعديل بيانات العرض">
        <div class="panel-heading">
          <span class="section-mark"></span>
          <div>
            <h2>بيانات العرض</h2>
            <p>أي تعديل يظهر مباشرة في المعاينة.</p>
          </div>
        </div>
        <form id="editorForm" class="editor-form"></form>
      </aside>

      <section class="preview-shell" aria-label="معاينة عرض السعر">
        <div class="preview-toolbar">
          <div class="preview-toolbar-meta">
            <span>معاينة A4</span>
            <span id="pageCount"></span>
          </div>
          <div class="zoom-controls" aria-label="تكبير المعاينة">
            <button class="zoom-btn is-active" type="button" data-preview-zoom="fit">ملاءمة</button>
            <button class="zoom-btn" type="button" data-preview-zoom="100">100%</button>
            <button class="zoom-btn" type="button" data-preview-zoom="75">75%</button>
          </div>
          <span id="overflowWarning" class="overflow-warning" role="alert" hidden></span>
        </div>
        <div id="preview" class="preview"></div>
      </section>

      <aside class="projects-panel" aria-label="المشاريع المحفوظة">
        <div class="panel-heading">
          <span class="section-mark"></span>
          <div>
            <h2>المشاريع</h2>
            <p>احفظ العروض وانتقل بينها.</p>
          </div>
        </div>
        <div class="projects-actions">
          <p id="saveStatus" class="save-status">لم يتم الحفظ بعد</p>
          <button id="newProjectBtn" class="secondary-btn" type="button">مشروع جديد</button>
          <button id="saveProjectBtn" class="primary-btn" type="button">حفظ المشروع</button>
          <button id="duplicateProjectBtn" class="secondary-btn" type="button">حفظ كنسخة</button>
        </div>
        <div id="projectsList" class="projects-list" aria-live="polite"></div>
        <button id="deleteProjectBtn" class="danger-btn" type="button">حذف المشروع الحالي</button>

        <div class="backup-block">
          <h3>النسخ الاحتياطي</h3>
          <p id="backupStatus" class="backup-status" data-state="off" aria-live="polite">النسخ الاحتياطي التلقائي غير مُفعّل</p>
          <button id="enableBackupBtn" class="primary-btn" type="button">تفعيل النسخ الاحتياطي التلقائي</button>
          <button id="backupNowBtn" class="secondary-btn" type="button">نسخ احتياطي الآن</button>
          <button id="restoreBackupBtn" class="secondary-btn" type="button">استعادة من ملف</button>
        </div>
      </aside>
    </main>

    <script src="app.js?v=v4"></script>
  </body>
</html>
