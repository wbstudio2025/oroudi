<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>محرر عروض الأسعار | الدر النفيس</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <img src="assets/LOGO.png" alt="شعار شركة الدر النفيس للاستشارات الهندسية">
        <div>
          <p>شركة الدر النفيس للاستشارات الهندسية</p>
          <h1>محرر عروض خدمات التصميم وإصدار رخصة بناء</h1>
        </div>
      </div>
      <div class="actions">
        <button id="printBtn" class="primary-btn" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 9V3h12v6M6 17H4a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2"/>
            <path d="M6 14h12v7H6zM8 6h8"/>
          </svg>
          طباعة / حفظ PDF
        </button>
        <button id="resetBtn" class="secondary-btn" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 12a9 9 0 1 0 3-6.7"/>
            <path d="M3 4v6h6"/>
          </svg>
          إعادة تعبئة البيانات الافتراضية
        </button>
      </div>
    </header>

    <main class="workspace">
      <aside class="editor-panel" aria-label="لوحة تعديل بيانات العرض">
        <div class="panel-heading">
          <span class="section-mark"></span>
          <div>
            <h2>بيانات العرض</h2>
            <p>أي تعديل يظهر مباشرة في المعاينة.</p>
          </div>
        </div>
        <form id="editorForm" class="editor-form"></form>
      </aside>

      <section class="preview-shell" aria-label="معاينة عرض السعر">
        <div class="preview-toolbar">
          <span>معاينة A4</span>
          <span id="pageCount"></span>
        </div>
        <div id="preview" class="preview"></div>
      </section>
    </main>

    <script src="app.js?v=project-types"></script>
  </body>
</html>
